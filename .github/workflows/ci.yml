name: ci

# Build + test on every push/PR to master so regressions are caught before
# a release tag is cut. Does NOT publish anything.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Build macro-enabled .xlsm
        run: python scripts/build_xlsm.py

      - name: Scaffold request-folder
        run: python scripts/make_request_folder.py

      - name: Verify artifact structure
        run: |
          python - <<'PY'
          import zipfile, openpyxl
          from pyopenvba import excel as ex
          p = "dist/firewall-policy-automation.xlsm"
          z = zipfile.ZipFile(p)
          assert z.testzip() is None
          assert any("vbaProject.bin" in n for n in z.namelist())
          g = ex.ExcelFile(p)
          mods = g.module_names()
          assert "FirewallPolicyAutomation" in mods and "FirewallRouteAnalysis" in mods
          assert "Module1" not in mods
          g.close()
          wb = openpyxl.load_workbook(p, keep_vba=True)
          need = {"requests", "firewalls", "firewall_ranges",
                  "settings", "header_aliases", "processing_log",
                  "secui_batch", "secui_cli", "vendor_cli_templates",
                  "service_catalog", "sample-request-format", "usage"}
          assert need.issubset(set(wb.sheetnames)), wb.sheetnames
          assert wb["requests"].max_column == 25
          print("CI artifact OK")
          PY

      - name: Upload .xlsm artifact
        uses: actions/upload-artifact@v4
        with:
          name: firewall-policy-automation-xlsm
          path: dist/firewall-policy-automation.xlsm
          if-no-files-found: error

      - name: Upload request-folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: request-folder
          path: request-folder/
          if-no-files-found: error
