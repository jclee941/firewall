name: ci

# Build + test on every push/PR to master so regressions are caught before
# a release tag is cut. Does NOT publish anything.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install LibreOffice smoke runtime
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libreoffice-calc

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Build macro-enabled .xlsm
        run: python scripts/build_xlsm.py

      - name: Scaffold request-folder
        run: python scripts/make_request_folder.py

      - name: Verify artifact structure
        run: |
          python - <<'PY'
          import zipfile, openpyxl
          from pyopenvba import excel as ex
          p = "dist/firewall-policy-automation.xlsm"
          z = zipfile.ZipFile(p)
          assert z.testzip() is None
          assert any("vbaProject.bin" in n for n in z.namelist())
          g = ex.ExcelFile(p)
          mods = g.module_names()
          assert "FirewallPolicyAutomation" in mods and "FirewallRouteAnalysis" in mods
          assert "Module1" not in mods
          g.close()
          wb = openpyxl.load_workbook(p, keep_vba=True)
          need = {"requests", "firewalls", "firewall_ranges",
                  "settings", "header_aliases", "processing_log", "route_results",
                  "secui_cli", "vendor_cli_templates",
                  "service_catalog", "sample-request-format", "usage"}
          assert need.issubset(set(wb.sheetnames)), wb.sheetnames
          legacy = {"secui_batch", "secui_policy_export", "policy_analysis", "policy_summary"}
          assert legacy.isdisjoint(set(wb.sheetnames)), wb.sheetnames
          assert wb["requests"].max_column == 14
          print("CI artifact OK")
          PY

      - name: Upload .xlsm artifact
        uses: actions/upload-artifact@v7
        with:
          name: firewall-policy-automation-xlsm
          path: dist/firewall-policy-automation.xlsm
          if-no-files-found: error

      - name: Upload request-folder artifact
        uses: actions/upload-artifact@v7
        with:
          name: request-folder
          path: request-folder/
          if-no-files-found: error

  create-release-tag:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create next release tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force
          existing_for_head="$(git tag --points-at HEAD --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
          if [ -n "$existing_for_head" ]; then
            echo "HEAD is already tagged as $existing_for_head; skipping auto tag."
            exit 0
          fi
          latest="$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n 1 || true)"
          if [ -z "$latest" ]; then
            next="v1.0.0"
          else
            version="${latest#v}"
            IFS='.' read -r major minor patch <<< "$version"
            next="v${major}.${minor}.$((patch + 1))"
          fi
          if git rev-parse "$next" >/dev/null 2>&1; then
            echo "Tag $next already exists"
            exit 1
          fi
          git tag "$next"
          git push origin "$next"
          gh workflow run release.yml --ref "$next" -f tag="$next"
