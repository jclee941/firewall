name: release

# Tag-driven release automation:
#   git tag v1.2.3 && git push origin v1.2.3
# builds the macro-enabled .xlsm on a clean Ubuntu runner, runs the full
# test suite, then publishes a GitHub Release with the .xlsm attached.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.1)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^[v][0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release tag must match vMAJOR.MINOR.PATCH: $TAG"
            exit 1
          fi
          git fetch --tags --force
          tag_sha="$(git rev-list -n 1 "$TAG")"
          head_sha="$(git rev-parse HEAD)"
          if [ "$tag_sha" != "$head_sha" ]; then
            echo "::error::tag $TAG does not match checked-out commit"
            exit 1
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install LibreOffice smoke runtime
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libreoffice-calc

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Build macro-enabled .xlsm
        run: python scripts/build_xlsm.py

      - name: Verify artifact (vbaProject + modules + sheets)
        run: |
          python - <<'PY'
          import zipfile, openpyxl
          from pyopenvba import excel as ex
          p = "dist/firewall-policy-automation.xlsm"
          z = zipfile.ZipFile(p)
          assert z.testzip() is None, "zip corrupt"
          assert any("vbaProject.bin" in n for n in z.namelist()), "no vbaProject.bin"
          g = ex.ExcelFile(p)
          mods = g.module_names()
          assert "FirewallPolicyAutomation" in mods and "FirewallRouteAnalysis" in mods, mods
          assert "Module1" not in mods, "Module1 not removed"
          g.close()
          wb = openpyxl.load_workbook(p, keep_vba=True)
          need = {"requests", "firewalls", "firewall_ranges",
                  "settings", "header_aliases", "processing_log", "route_results",
                  "secui_cli", "vendor_cli_templates",
                  "service_catalog", "sample-request-format", "usage"}
          assert need.issubset(set(wb.sheetnames)), wb.sheetnames
          legacy = {"secui_batch", "secui_policy_export", "policy_analysis", "policy_summary"}
          assert legacy.isdisjoint(set(wb.sheetnames)), wb.sheetnames
          assert wb["requests"].max_column == 14, wb["requests"].max_column
          print("artifact OK:", p)
          PY

      - name: Scaffold request-folder and bundle
        run: |
          python scripts/make_request_folder.py
          mkdir -p bundle
          cp dist/firewall-policy-automation.xlsm bundle/
          cp -r request-folder bundle/
          cp dist/README.txt bundle/ 2>/dev/null || true
          (cd bundle && zip -r ../firewall-policy-automation-bundle.zip .)
          test -f firewall-policy-automation-bundle.zip

      - name: Build Python GUI/CLI bundle with dependencies
        run: |
          pip install -r requirements-gui.txt
          python scripts/build_release_bundle.py --output secui-cli-gui-release.zip
          test -f secui-cli-gui-release.zip

      - name: Build no-Python Linux GUI bundle
        run: |
          pip install pyinstaller
          python scripts/build_standalone_gui.py --output secui-gui-linux-x64.zip
          test -f secui-gui-linux-x64.zip

      - name: Version-stamp the artifact filenames
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          cp dist/firewall-policy-automation.xlsm "firewall-policy-automation-${TAG}.xlsm"
          cp firewall-policy-automation-bundle.zip "firewall-policy-automation-${TAG}-bundle.zip"
          cp secui-cli-gui-release.zip "secui-cli-gui-${TAG}.zip"
          cp secui-gui-linux-x64.zip "secui-gui-linux-x64-${TAG}.zip"
          ls -la firewall-policy-automation-${TAG}.xlsm firewall-policy-automation-${TAG}-bundle.zip secui-cli-gui-${TAG}.zip secui-gui-linux-x64-${TAG}.zip

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<'EOF'
          신청서 엑셀을 받아 경로탐색으로 `대상방화벽`을 산출하고 SECUI CLI를 생성하는 도구입니다.

          ## 다운로드 / 설치
          - Python 없이 실행: **secui-gui-windows-x64-<버전>.zip** 또는 **secui-gui-linux-x64-<버전>.zip**을 받으세요. native GUI 실행 파일과 샘플 workbook/request-folder가 함께 포함됩니다.
          - Python 설치형: **secui-cli-gui-<버전>.zip**을 받으세요. Python 소스와 `requirements-gui.txt` 기준 pip wheel 의존성이 함께 포함됩니다.
          - Excel 방식: **firewall-policy-automation.xlsm** 하나만 받으면 됩니다 (매크로·시트·데이터 전부 내장). Microsoft Excel(Windows)에서 열고 매크로를 사용 설정하세요.

          ## Python GUI/CLI 사용
          - standalone zip은 압축 해제 후 `secui-gui` 또는 `secui-gui.exe`를 실행하세요.
          - Python 설치형 zip은 `install_offline.sh/.bat` 실행 후 `run_gui.sh/.bat`를 실행하세요.
          - GUI에서 workbook/request-folder와 export 형식(text/xlsx/both)을 선택 후 Export하세요.

          ## 사용 순서
          1. `firewalls` : SECUI 장비명, 벤더, 사용여부
          2. `firewall_ranges` : 출발지/목적지 대역별 통과 방화벽과 인터페이스
          3. `vendor_cli_templates` : SECUI 정책 생성 CLI 템플릿 확인/수정
          4. `settings` : 신청서 폴더(request_folder), 파싱 대상(parse_sheet), 헤더 별칭(header_alias)
          5. 신청서를 폴더에 모은 뒤 통합 문서를 열면 신청서 통합, 경로탐색, `secui_cli` 생성이 자동 실행됩니다.
          6. `requests`에서 최종 신청 목록을 보고, `route_results`에서 경로탐색 결과를 확인하세요.
          7. 수동 실행이 필요하면 `MergeFirewallRequestFolder`, `AnalyzeRequestRoutes`, `ConvertRequestsToSecuiCli`를 순서대로 실행하세요.

          ## 주요 기능
          - 신청서 파싱 후 `firewall_ranges` 기준 `대상방화벽` 자동 산출
          - 원본에 `대상방화벽`이 있으면 그 값을 우선 사용하고, 공란이면 경로탐색 결과 사용
          - `requests`는 최종 신청 목록 컬럼만 표시하고, 경로 관련 정보는 `route_results`로 분리
          - 릴리즈 통합 문서의 `secui_cli`에 바로 확인 가능한 예시 CLI 포함
          - 같은 장비 + 같은 목적지 + 같은 서비스는 출발지 그룹으로 묶음
          - 같은 장비 + 같은 출발지 + 같은 목적지는 서비스/포트 그룹으로 묶음
          - 출발지와 서비스가 동시에 다른 조합은 과허용 방지를 위해 분리
          - 출발지/목적지/서비스 룰별 그룹 객체 생성 후 정책에서 참조
          - `ANY`, `ALL`, `*`, `0.0.0.0/0`은 객체 생성 없이 정책 `ANY`로 출력
          - 사용자 설정 시트 `firewall_ranges`의 source_interface/destination_interface를 CLI 템플릿에 반영
          - 세로 병합 셀 신청서 처리 (행 누락 없음)
          - 하위폴더 재귀 + 폴더명 파싱 (정보보호센터_1234 → 팀/문서번호)
          - 사용자 정의 헤더 별칭 (settings header_alias)
          - DRM 환경 대응 (VBA Workbooks.Open), .xls/.xlsx/.xlsm 처리
          - 배치 양식, 기존 정책 export 비교, 정책 요약 시트는 CLI 정합성 우선 범위에서 제거

          첨부물: `secui-gui-windows-x64-<버전>.zip`/`secui-gui-linux-x64-<버전>.zip`(Python 불필요 native standalone), `secui-cli-gui-<버전>.zip`(Python GUI/CLI + wheel 의존성), `firewall-policy-automation-<버전>.xlsm`(단일 파일), `firewall-policy-automation-<버전>-bundle.zip`(xlsm + request-folder 동봉).
          이 릴리즈는 GitHub Actions에서 자동 빌드·테스트·검증되었습니다.
          EOF
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "firewall-policy-automation-${TAG}.xlsm" \
              "firewall-policy-automation-${TAG}-bundle.zip" \
              "secui-cli-gui-${TAG}.zip" \
              "secui-gui-linux-x64-${TAG}.zip" \
              --repo "${{ github.repository }}" --clobber
          else
            gh release create "$TAG" \
              "firewall-policy-automation-${TAG}.xlsm" \
              "firewall-policy-automation-${TAG}-bundle.zip" \
              "secui-cli-gui-${TAG}.zip" \
              "secui-gui-linux-x64-${TAG}.zip" \
              --repo "${{ github.repository }}" \
              --target "${{ github.sha }}" \
              --title "$TAG — SECUI CLI Generator" \
              --notes-file "$NOTES_FILE"
          fi

  build-standalone-windows:
    runs-on: windows-latest
    needs: build-and-release
    env:
      PYTHONUTF8: "1"
      QT_QPA_PLATFORM: "offscreen"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^[v][0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::release tag must match vMAJOR.MINOR.PATCH: $TAG"
            exit 1
          fi
          git fetch --tags --force
          tag_sha="$(git rev-list -n 1 "$TAG")"
          head_sha="$(git rev-parse HEAD)"
          if [ "$tag_sha" != "$head_sha" ]; then
            echo "::error::tag $TAG does not match checked-out commit"
            exit 1
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-gui.txt
          pip install pyinstaller

      - name: Verify GUI/export path
        run: python -m pytest tests/test_secui_gui.py tests/test_secui_cli_script.py -q

      - name: Build no-Python Windows GUI bundle
        run: |
          python scripts/build_standalone_gui.py --output secui-gui-windows-x64.zip
          if (!(Test-Path secui-gui-windows-x64.zip)) { throw "standalone zip missing" }

      - name: Upload no-Python Windows GUI bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.tag.outputs.name }}"
          Copy-Item secui-gui-windows-x64.zip "secui-gui-windows-x64-$tag.zip"
          gh release upload $tag "secui-gui-windows-x64-$tag.zip" --repo "${{ github.repository }}" --clobber
