name: release

# Tag-driven release automation:
#   git tag v1.2.3 && git push origin v1.2.3
# builds the macro-enabled .xlsm on a clean Ubuntu runner, runs the full
# test suite, then publishes a GitHub Release with the .xlsm attached.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.1)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Build macro-enabled .xlsm
        run: python scripts/build_xlsm.py

      - name: Verify artifact (vbaProject + modules + sheets)
        run: |
          python - <<'PY'
          import zipfile, openpyxl
          from pyopenvba import excel as ex
          p = "dist/firewall-policy-automation.xlsm"
          z = zipfile.ZipFile(p)
          assert z.testzip() is None, "zip corrupt"
          assert any("vbaProject.bin" in n for n in z.namelist()), "no vbaProject.bin"
          g = ex.ExcelFile(p)
          mods = g.module_names()
          assert "FirewallPolicyAutomation" in mods and "FirewallRouteAnalysis" in mods, mods
          assert "Module1" not in mods, "Module1 not removed"
          g.close()
          wb = openpyxl.load_workbook(p, keep_vba=True)
          need = {"requests", "firewalls", "firewall_ranges",
                  "settings", "header_aliases", "processing_log",
                  "secui_batch", "secui_cli", "secui_policy_export",
                  "policy_analysis", "policy_summary", "vendor_cli_templates",
                  "service_catalog", "sample-request-format", "usage"}
          assert need.issubset(set(wb.sheetnames)), wb.sheetnames
          assert wb["requests"].max_column == 25, wb["requests"].max_column
          print("artifact OK:", p)
          PY

      - name: Scaffold request-folder and bundle
        run: |
          python scripts/make_request_folder.py
          mkdir -p bundle
          cp dist/firewall-policy-automation.xlsm bundle/
          cp -r request-folder bundle/
          cp dist/README.txt bundle/ 2>/dev/null || true
          (cd bundle && zip -r ../firewall-policy-automation-bundle.zip .)
          test -f firewall-policy-automation-bundle.zip

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Version-stamp the artifact filenames
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          cp dist/firewall-policy-automation.xlsm "firewall-policy-automation-${TAG}.xlsm"
          cp firewall-policy-automation-bundle.zip "firewall-policy-automation-${TAG}-bundle.zip"
          ls -la firewall-policy-automation-${TAG}.xlsm firewall-policy-automation-${TAG}-bundle.zip

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          NOTES_FILE="$(mktemp)"
          cat > "$NOTES_FILE" <<'EOF'
          신청서 엑셀을 받아 **사용자가 정의한 방화벽 통과 대역 기준으로 대상방화벽** 을 자동 산정하는 Excel 네이티브(VBA) 도구입니다.

          ## 다운로드 / 설치
          아래 **firewall-policy-automation.xlsm** 하나만 받으면 됩니다 (매크로·시트·데이터 전부 내장). Microsoft Excel(Windows)에서 열고 매크로를 사용 설정하세요.

          ## 사용 순서
          1. `firewalls` : 방화벽 장비 목록
          2. `firewall_ranges` : 출발지대역, 목적지대역, 방향, 순서
          3. `service_catalog` : SECUI 서비스 표기 예시(tcp/443 등) 확인
          4. `settings` : 신청서 폴더(request_folder), 파싱 대상(parse_sheet), 헤더 별칭(header_alias)
          5. 신청서를 폴더에 모으고 → 매크로 `MergeFirewallRequestFolder` 실행 (Alt+F8). `request-folder/`(번들 zip)를 그대로 쓰거나 복사해서 사용하세요.
          6. 방화벽 대역만 재분석: `AnalyzeRequestRoutes`

          ## 주요 기능
          - IP / CIDR 대역 / 다중주소 리스트 매칭
          - 사용자가 정의한 `firewall_ranges` 순서대로 통과 방화벽 산정
          - 세로 병합 셀 신청서 처리 (행 누락 없음)
          - 하위폴더 재귀 + 폴더명 파싱 (정보보호센터_1234 → 팀/문서번호)
          - 사용자 정의 헤더 별칭 (settings header_alias)
          - DRM 환경 대응 (VBA Workbooks.Open), .xls/.xlsx/.xlsm 처리
          - SECUI export 기반 기존 정책 비교 (`secui_policy_export` → `policy_analysis`)
          - 기존 허용·차단·검토필요 건수 요약 (`policy_summary`)

          첨부물: `firewall-policy-automation-<버전>.xlsm`(단일 파일) + `firewall-policy-automation-<버전>-bundle.zip`(xlsm + request-folder 동봉).
          이 릴리즈는 GitHub Actions에서 자동 빌드·테스트·검증되었습니다.
          EOF
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "firewall-policy-automation-${TAG}.xlsm" \
              "firewall-policy-automation-${TAG}-bundle.zip" \
              --repo "${{ github.repository }}" --clobber
          else
            gh release create "$TAG" \
              "firewall-policy-automation-${TAG}.xlsm" \
              "firewall-policy-automation-${TAG}-bundle.zip" \
              --repo "${{ github.repository }}" \
              --target "${{ github.sha }}" \
              --title "$TAG — Firewall Range Analysis (대상방화벽 대역 분석)" \
              --notes-file "$NOTES_FILE"
          fi
